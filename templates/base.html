<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Graph & Tree Analysis Toolkit{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0a0d14;
      --surface: #111827;
      --surface2: #1e2a3a;
      --border: #1e3a5f;
      --accent: #0ea5e9;
      --accent2: #6366f1;
      --accent3: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: 0 0 20px rgba(14,165,233,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,13,20,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      display: flex; align-items: center; gap: .75rem;
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem; font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-brand .icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .nav-links { display: flex; gap: .25rem; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      padding: .5rem 1rem; border-radius: 8px;
      font-size: .9rem; font-weight: 500;
      transition: all .2s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--surface);
    }
    .nav-links a.active { color: var(--accent); }

    /* ── MAIN ── */
    main { padding-top: 64px; min-height: 100vh; }

    /* ── UTILITIES ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .card:hover { border-color: rgba(14,165,233,.4); }
    .badge {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .25rem .75rem; border-radius: 99px; font-size: .8rem;
      font-family: 'Space Mono', monospace;
    }
    .badge-blue { background: rgba(14,165,233,.15); color: var(--accent); border: 1px solid rgba(14,165,233,.3); }
    .badge-green { background: rgba(16,185,129,.15); color: var(--accent3); border: 1px solid rgba(16,185,129,.3); }
    .badge-yellow { background: rgba(245,158,11,.15); color: var(--warn); border: 1px solid rgba(245,158,11,.3); }
    .badge-red { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.3); }

    label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: .4rem; font-weight: 500; }
    input, textarea, select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: .65rem .9rem;
      font-family: 'Space Mono', monospace; font-size: .85rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14,165,233,.15);
    }
    textarea { resize: vertical; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      padding: .65rem 1.5rem; border-radius: 10px;
      font-family: 'Sora', sans-serif; font-size: .9rem; font-weight: 600;
      border: none; cursor: pointer; transition: all .2s; text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #0284c7);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--glow); }
    .btn-secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-green {
      background: linear-gradient(135deg, var(--accent3), #059669);
      color: #fff;
    }
    .btn-green:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(16,185,129,.3); }

    .result-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem;
      font-family: 'Space Mono', monospace; font-size: .85rem;
    }
    .result-box .label { color: var(--muted); font-size: .75rem; margin-bottom: .5rem; }
    .result-img { width: 100%; border-radius: 10px; margin-top: 1rem; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .alert {
      padding: .85rem 1rem; border-radius: 10px; margin-top: 1rem;
      font-size: .85rem; display: flex; align-items: flex-start; gap: .6rem;
    }
    .alert-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }

    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-title {
      font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: .6rem; color: var(--text);
    }
    .section-title i { color: var(--accent); }

    .toggle-group {
      display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .toggle-btn {
      padding: .4rem .9rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); cursor: pointer; font-size: .82rem;
      transition: all .2s; font-family: 'Space Mono', monospace;
    }
    .toggle-btn.active {
      background: rgba(14,165,233,.2); border-color: var(--accent); color: var(--accent);
    }

    /* ── GRID LAYOUT FOR TOOLS ── */
    .tools-layout {
      display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem;
      padding: 1.5rem 0;
    }
    .sidebar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1rem; height: fit-content;
      position: sticky; top: 80px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .9rem; border-radius: 10px;
      color: var(--muted); cursor: pointer; font-size: .88rem;
      transition: all .2s; border: none; background: none; width: 100%;
      text-align: left;
    }
    .sidebar-item:hover { color: var(--text); background: var(--surface2); }
    .sidebar-item.active { color: var(--accent); background: rgba(14,165,233,.1); }
    .sidebar-item i { width: 18px; text-align: center; }
    .sidebar-sep { border-top: 1px solid var(--border); margin: .6rem 0; }
    .sidebar-label { font-size: .72rem; color: var(--muted); padding: .3rem .9rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }

    .tool-panel { display: none; }
    .tool-panel.active { display: block; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .form-group { margin-bottom: 1.1rem; }

    /* Checkboxes */
    .checkbox-group { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .checkbox-group label {
      display: flex; align-items: center; gap: .5rem;
      cursor: pointer; font-size: .88rem; color: var(--text); margin: 0;
    }
    input[type=checkbox] { width: auto; accent-color: var(--accent); }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: .75rem; margin-top: 1rem; }
    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem; text-align: center;
    }
    .stat-card .val { font-size: 1.6rem; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--accent); }
    .stat-card .key { font-size: .75rem; color: var(--muted); margin-top: .2rem; }

    /* Color swatch */
    .color-list { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .75rem; }
    .color-chip {
      padding: .3rem .8rem; border-radius: 99px; font-size: .8rem;
      font-family: 'Space Mono', monospace; font-weight: 700;
    }

    /* Mobile */
    @media(max-width:768px){
      .tools-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .two-col { grid-template-columns: 1fr; }
      .result-grid { grid-template-columns: 1fr; }
      .nav-links a span { display: none; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <a class="nav-brand" href="/">
    <div class="icon"><i class="fas fa-project-diagram"></i></div>
    <span>Graph Toolkit</span>
  </a>
  <div class="nav-links">
    <a href="/" class="{% if request.path=='/' %}active{% endif %}"><i class="fas fa-home"></i> <span>Home</span></a>
    <a href="/about" class="{% if request.path=='/about' %}active{% endif %}"><i class="fas fa-book-open"></i> <span>About</span></a>
    <a href="/tools" class="{% if request.path=='/tools' %}active{% endif %}"><i class="fas fa-tools"></i> <span>Graph Tools</span></a>
    <a href="/tree" class="{% if request.path=='/tree' %}active{% endif %}"><i class="fas fa-tree"></i> <span>Tree Tools</span></a>
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
<script>
// Shared input builder: populate graph form from a template
window.loadExample = function(verticesId, edgesId, verts, edges) {
  document.getElementById(verticesId).value = verts;
  document.getElementById(edgesId).value = edges;
};
</script>
{% block scripts %}{% endblock %}
</body>
</html>
